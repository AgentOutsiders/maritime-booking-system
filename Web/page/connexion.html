<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="../logo/logo_can_sf.png" type="image/png" />
		<title>Connexion | CAN</title>
		<link rel="stylesheet" href="../css/style.css" />
	</head>

	<body>
		<section class="zoneTexte7">
			<div class="connexionFondBleu">

				<div class="footerRow connexionBlanc animationConnexion">
					<img src="../img/puce/bouee/boe1_sf.png" alt="Icône bouée" width="40" height="40" />
					<h1>&nbsp;&nbsp;&nbsp;&nbsp;Consulter votre réservation&nbsp;&nbsp;&nbsp;&nbsp;</h1>
					<img src="../img/puce/bouee/boe1_sf.png" alt="Icône bouée" width="40" height="40" />
				</div>

				<div class="regroupementConnexion">
					<div class="connexionFondBlanc1">
						<img class="imageConnexion1" src="../logo/logo_can_sf.png" alt="Logo de la CAN">
						<p class="texte1Connexion">
							Veuillez saisir votre numéro de réservation <br> pour accéder aux détails.
						</p>

						<div class="connexionVerticale">
							<input id="numRes" placeholder="Exemple : 12" />
							<button onclick="testConnexion()">Valider et consulter</button>
						</div>
						
						<p id="erreur" class="erreurConnexion">&nbsp;</p>
					</div>

					<div class="connexionFondBlanc2">
						<img class="imageConnexion2 imagePhare" src="../img/phare/phr1.png" alt="Logo d'un phare">
					</div>
				</div>

			</div>
		</section>

		<script src="../js/connexion.js"></script>
	</body>
</html>
